<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ahorro">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5ca8"/>
      <stop offset="55%" stop-color="#ff8b3d"/>
      <stop offset="100%" stop-color="#23b495"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2f3b" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <circle cx="256" cy="268" r="142" fill="#ffffff" opacity="0.96"/>
  </g>

  <text x="256" y="305" text-anchor="middle" font-size="170" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">💰</text>
</svg>
